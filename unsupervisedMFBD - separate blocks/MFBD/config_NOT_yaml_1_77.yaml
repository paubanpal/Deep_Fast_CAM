# Guidelines for file: https://aasensio.github.io/torchmfbd/userguide/deconvolution.html

# Definition of parameters (for NOT telescope)
# (https://www.not.iac.es/telescope/tti/technical-details.html)
telescope:
    # NOT: diameter: 256.0cm,   sec. diameter: 51.0cm
    diameter: 256.0     # in cm
    central_obscuration : 51.0   # in cm

images:
    # NOT: pix_size: 0.025arcsec
    n_pixel : 512
    pix_size : 0.025    # arcsec
    apodization_border : 6

object1:
    wavelength : 8250.0 # amstrong
    image_filter: tophat
    cutoff : [0.75, 0.80]   # try diff values
    s_u_joint: 250.0    # ¿?

# object2:
#     wavelength : 8250.0 # amstrong
#     image_filter: tophat
#     cutoff : [0.75, 0.80]
#     s_u_joint: 250.0

optimization:
    gpu : 0
    transform : softplus
    softplus_scale : 1.0
    lr_obj : 0.02
    lr_modes : 0.08
    show_object_info : False
    loss_type : joint

regularization:
    iuwt1:
        variable : object
        lambda : 0.0
        nbands : 5

psf:
    model : kl
    nmax_modes : 77
    n_pixel: 512
    #n_pixel: 512    # 128 por defecto

initialization:
    object : contrast
    modes_std : 0.0

annealing:
    type: sigmoid
    start_pct : 0.0
    end_pct : 0.85